<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>$title$ — Agent Orchestrator Design</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Serif:wght@400;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #f2efe7;
        --panel: #fffdf8;
        --ink: #1f1a16;
        --muted: #6f6357;
        --brand: #165a72;
        --line: #dfd3c2;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        color: var(--ink);
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        line-height: 1.65;
        background:
          radial-gradient(circle at 12% 10%, #ebdfcb 0%, transparent 35%),
          radial-gradient(circle at 88% 85%, #e5d4ba 0%, transparent 30%), var(--bg);
      }

      .wrap {
        max-width: 860px;
        margin: 0 auto;
        padding: 2.5rem 1.5rem 4rem;
      }

      .back {
        display: inline-block;
        margin-bottom: 1.5rem;
        color: var(--brand);
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 500;
      }
      .back:hover { text-decoration: underline; }

      h1, h2, h3, h4 {
        font-family: "IBM Plex Serif", Georgia, serif;
      }

      h1 {
        font-size: 2rem;
        line-height: 1.25;
        margin-bottom: 0.3rem;
      }

      .subtitle {
        color: var(--muted);
        font-size: 0.95rem;
        margin-bottom: 2rem;
        padding-bottom: 1.5rem;
        border-bottom: 1px solid var(--line);
      }

      h2 {
        font-size: 1.45rem;
        margin-top: 2.5rem;
        margin-bottom: 0.6rem;
        padding-bottom: 0.35rem;
        border-bottom: 1px solid var(--line);
      }

      h3 {
        font-size: 1.15rem;
        margin-top: 1.8rem;
        margin-bottom: 0.4rem;
      }

      h4 {
        font-size: 1rem;
        margin-top: 1.4rem;
        margin-bottom: 0.3rem;
      }

      p { margin: 0.7rem 0; }

      ul, ol {
        margin: 0.5rem 0;
        padding-left: 1.5rem;
      }

      li { margin-bottom: 0.25rem; }

      a { color: var(--brand); }

      code {
        font-family: "IBM Plex Mono", "SFMono-Regular", monospace;
        background: #f3ebe0;
        border-radius: 4px;
        padding: 0.12rem 0.3rem;
        font-size: 0.88em;
      }

      pre {
        margin: 1rem 0;
        padding: 1rem;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #faf4ec;
        overflow-x: auto;
        line-height: 1.5;
      }

      pre code {
        background: none;
        padding: 0;
        border-radius: 0;
        font-size: 0.85em;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin: 1rem 0;
        font-size: 0.92rem;
      }

      th, td {
        text-align: left;
        padding: 0.55rem 0.75rem;
        border: 1px solid var(--line);
      }

      th {
        background: #f3ebe0;
        font-weight: 600;
        font-family: "IBM Plex Serif", Georgia, serif;
      }

      tr:nth-child(even) td { background: #fdfbf7; }

      blockquote {
        margin: 1rem 0;
        padding: 0.75rem 1rem;
        border-left: 3px solid var(--brand);
        background: var(--panel);
        border-radius: 0 10px 10px 0;
        color: var(--muted);
      }

      blockquote p { margin: 0.3rem 0; }

      hr {
        border: none;
        border-top: 1px solid var(--line);
        margin: 2rem 0;
      }

      strong { font-weight: 600; }

      .content {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--panel);
        padding: 2rem 2.5rem;
      }

      @media (max-width: 600px) {
        .content { padding: 1.2rem 1rem; }
        h1 { font-size: 1.5rem; }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <a href="/" class="back">← All Design Docs</a>
      <div class="content">
$body$
      </div>
    </main>
  </body>
</html>
